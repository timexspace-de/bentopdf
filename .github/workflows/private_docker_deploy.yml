name: Build and Push Docker Images (Custom)

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        mode:
          - name: default
            simple_mode: false
            suffix: ""
          - name: simple
            simple_mode: true
            suffix: "-simple"

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "version_without_v=${VERSION#v}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=${GITHUB_SHA::7}
            echo "version=edge" >> $GITHUB_OUTPUT
            echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push amd64
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64
          build-args: |
            SIMPLE_MODE=${{ matrix.mode.simple_mode }}
            BASE_URL=${{ vars.BASE_URL }}
            VITE_DEFAULT_LANGUAGE=${{ vars.VITE_DEFAULT_LANGUAGE }}
            VITE_BRAND_NAME=${{ vars.VITE_BRAND_NAME }}
            VITE_BRAND_LOGO=${{ vars.VITE_BRAND_LOGO }}
            VITE_FOOTER_TEXT=${{ vars.VITE_FOOTER_TEXT }}
            DISABLE_TOOLS=${{ vars.DISABLE_TOOLS }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/bentopdf${{ matrix.mode.suffix }}:${{ steps.version.outputs.version }}-amd64
            ghcr.io/${{ github.repository_owner }}/bentopdf${{ matrix.mode.suffix }}:edge-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        mode:
          - name: default
            simple_mode: false
            suffix: ""
          - name: simple
            simple_mode: true
            suffix: "-simple"

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "version_without_v=${VERSION#v}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=${GITHUB_SHA::7}
            echo "version=edge" >> $GITHUB_OUTPUT
            echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push arm64
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/arm64
          build-args: |
            SIMPLE_MODE=${{ matrix.mode.simple_mode }}
            BASE_URL=${{ vars.BASE_URL }}
            VITE_DEFAULT_LANGUAGE=${{ vars.VITE_DEFAULT_LANGUAGE }}
            VITE_BRAND_NAME=${{ vars.VITE_BRAND_NAME }}
            VITE_BRAND_LOGO=${{ vars.VITE_BRAND_LOGO }}
            VITE_FOOTER_TEXT=${{ vars.VITE_FOOTER_TEXT }}
            DISABLE_TOOLS=${{ vars.DISABLE_TOOLS }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/bentopdf${{ matrix.mode.suffix }}:${{ steps.version.outputs.version }}-arm64
            ghcr.io/${{ github.repository_owner }}/bentopdf${{ matrix.mode.suffix }}:edge-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    permissions:
      packages: write
    strategy:
      matrix:
        mode:
          - name: default
            suffix: ""
          - name: simple
            suffix: "-simple"

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/bentopdf${{ matrix.mode.suffix }}:latest \
            ghcr.io/${{ github.repository_owner }}/bentopdf${{ matrix.mode.suffix }}:${{ github.ref_name }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/bentopdf${{ matrix.mode.suffix }}:${{ github.ref_name }}-arm64 || true

          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/bentopdf${{ matrix.mode.suffix }}:edge \
            ghcr.io/${{ github.repository_owner }}/bentopdf${{ matrix.mode.suffix }}:edge-amd64 \
            ghcr.io/${{ github.repository_owner }}/bentopdf${{ matrix.mode.suffix }}:edge-arm64
